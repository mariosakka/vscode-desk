name: Feature request
description: Suggest a new idea or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the situation where you ran into a limitation or friction.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you considered
      description: Any other approaches you thought of?

  - type: dropdown
    id: area
    attributes:
      label: Which area does this touch?
      options:
        - Sidebar / bookmarks
        - Page viewer (.relay files)
        - MCP server
        - Developer / contributor tooling
        - Other
    validations:
      required: true
