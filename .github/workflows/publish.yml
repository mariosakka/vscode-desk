name: CI / Publish

on:
  # Tests run when a PR is approved (not on every push or PR open)
  pull_request_review:
    types: [submitted]
  # Tests + publish run when a version tag is pushed
  push:
    tags: ['v*.*.*']

jobs:
  # ── Runs on PR approval or version tag push ────────────────────────────────
  test:
    name: Test
    if: github.event_name == 'push' || github.event.review.state == 'approved'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

  # ── Runs only when a version tag is pushed (e.g. v0.1.0) ──────────────────
  publish:
    name: Publish to VS Code Marketplace
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run compile

      - name: Publish
        run: npx @vscode/vsce publish -p ${{ secrets.VSCE_PAT }}
