name: CI / Publish

on:
  # Tests run when a PR is approved (not on every push or PR open)
  pull_request_review:
    types: [submitted]
  # Tests + publish run when a version tag is pushed
  push:
    tags: ['v*.*.*']

jobs:
  # ── Runs on PR approval or version tag push ────────────────────────────────
  test:
    name: Test
    if: github.event_name == 'push' || github.event.review.state == 'approved'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Run unit tests (Jest)
        run: npm test

      - name: Build webview assets (required for Playwright)
        run: npm run compile

      - name: Install Playwright browser
        run: npm run test:e2e:install

      - name: Run e2e tests (Playwright)
        run: npm run test:e2e

  # ── Runs only when a version tag is pushed (e.g. v0.1.0) ──────────────────
  publish:
    name: Publish to VS Code Marketplace
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run compile

      - name: Package extension
        run: npx @vscode/vsce package

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.vsix'
          generate_release_notes: true

      - name: Publish to VS Code Marketplace
        run: npx @vscode/vsce publish -p ${{ secrets.VSCE_PAT }}
