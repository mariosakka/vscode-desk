name: CI

on:
  # Tests run on every PR push to master
  pull_request:
    branches: [master]
  # Manual trigger for ad-hoc test runs
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Run unit tests (Jest)
        run: npm test

      - name: Build webview assets (required for Playwright)
        run: npm run compile

      - name: Install Playwright browser
        run: npm run test:e2e:install

      - name: Run e2e tests (Playwright)
        run: npm run test:e2e
