<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <rect width="100" height="100" rx="14" fill="#0d1117"/>

  <!-- outer frame ring -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="#c9a84c" stroke-width="2.8"/>

  <!-- equatorial band (flat ellipse, thicker) -->
  <ellipse cx="50" cy="50" rx="38" ry="11" fill="none" stroke="#c9a84c" stroke-width="2.8"/>

  <!-- meridian arc left (large, sits inside frame) -->
  <ellipse cx="50" cy="50" rx="11" ry="30" fill="none" stroke="#c9a84c" stroke-width="1.8" opacity="0.75"
    transform="rotate(-30 50 50)"/>

  <!-- meridian arc right (slightly smaller radius) -->
  <ellipse cx="50" cy="50" rx="11" ry="30" fill="none" stroke="#c9a84c" stroke-width="1.8" opacity="0.75"
    transform="rotate(30 50 50)"/>

  <!-- vertical axis pole -->
  <line x1="50" y1="12" x2="50" y2="88" stroke="#ffffff" stroke-width="1.4" opacity="0.9"/>

  <!-- axis knob top -->
  <circle cx="50" cy="12" r="2.2" fill="#ffffff" opacity="0.9"/>

  <!-- axis knob bottom -->
  <circle cx="50" cy="88" r="2.2" fill="#ffffff" opacity="0.9"/>

  <!-- center planet dot -->
  <circle cx="50" cy="50" r="3.2" fill="#c9a84c"/>
</svg>
